<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product — ShopWave</title>
  <link rel="stylesheet" href="ecomm.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    .page-header { background: var(--navy); padding: 14px 0; position: sticky; top: 0; z-index: 200; box-shadow: 0 2px 20px rgba(0,0,0,.25); }
    .page-header-inner { max-width: 1360px; margin: 0 auto; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; gap: 20px; }
    .breadcrumb { font-size: 13px; color: #8aa5cc; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
    .breadcrumb a { color: #8aa5cc; transition: color .2s; }
    .breadcrumb a:hover { color: var(--orange); }
    .breadcrumb span { color: #c5d8ff; }
    .product-detail-wrap { max-width: 1360px; margin: 0 auto; padding: 32px 20px; }
    .product-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: start; }
    .product-img-area { background: var(--bg); border-radius: var(--radius-xl); display: flex; align-items: center; justify-content: center; aspect-ratio: 1; font-size: 160px; position: sticky; top: 90px; box-shadow: var(--shadow-md); }
    .product-info { display: flex; flex-direction: column; gap: 18px; }
    .product-brand-tag { font-size: 12px; font-weight: 800; color: var(--orange); text-transform: uppercase; letter-spacing: .8px; }
    .product-title { font-family: var(--font-display); font-size: 28px; font-weight: 800; color: var(--navy); line-height: 1.3; }
    .product-rating-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .product-price-row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
    .product-price-now { font-size: 36px; font-weight: 800; color: var(--navy); }
    .product-price-was { font-size: 18px; color: var(--text-muted); text-decoration: line-through; }
    .product-price-off { font-size: 16px; font-weight: 700; color: var(--green); background: #d1fae5; padding: 4px 12px; border-radius: 8px; }
    .product-delivery-info { background: var(--bg); border-radius: var(--radius); padding: 16px 20px; display: flex; flex-direction: column; gap: 8px; }
    .product-delivery-row { display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--text); }
    .product-delivery-row strong { color: var(--navy); }
    .qty-selector { display: flex; align-items: center; gap: 14px; }
    .qty-selector label { font-size: 14px; font-weight: 700; color: var(--navy); }
    .qty-controls { display: flex; align-items: center; gap: 0; border: 2px solid var(--border); border-radius: 10px; overflow: hidden; }
    .qty-controls button { width: 40px; height: 40px; font-size: 20px; font-weight: 700; background: var(--bg); color: var(--navy); border: none; cursor: pointer; transition: background .2s; }
    .qty-controls button:hover { background: var(--navy); color: white; }
    .qty-controls span { width: 48px; text-align: center; font-size: 16px; font-weight: 700; color: var(--navy); }
    .product-actions { display: flex; gap: 12px; flex-wrap: wrap; }
    .product-actions .add-to-cart { flex: 1; padding: 15px; font-size: 15px; border-radius: 12px; }
    .product-actions .buy-now { flex: 1; padding: 15px; font-size: 15px; border-radius: 12px; }
    .product-actions .qv-wish { width: 52px; height: 52px; border-radius: 12px; font-size: 22px; }
    .info-tabs { border-bottom: 2px solid var(--border); display: flex; gap: 0; margin-top: 8px; }
    .info-tab { padding: 12px 20px; font-size: 14px; font-weight: 600; color: var(--text-muted); cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: color .2s, border-color .2s; }
    .info-tab.active { color: var(--navy); border-bottom-color: var(--orange); }
    .info-panel { display: none; padding: 20px 0; }
    .info-panel.active { display: block; }
    .policy-row { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 14px; color: var(--text); }
    .policy-row:last-child { border-bottom: none; }
    .policy-icon { font-size: 22px; flex-shrink: 0; }
    .related-section { max-width: 1360px; margin: 0 auto; padding: 0 20px 48px; }
    .related-section h2 { font-family: var(--font-display); font-size: 24px; font-weight: 800; color: var(--navy); margin-bottom: 24px; }
    .related-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
    .reviews-section { max-width: 1360px; margin: 0 auto; padding: 0 20px 48px; }
    .reviews-section h2 { font-family: var(--font-display); font-size: 24px; font-weight: 800; color: var(--navy); margin-bottom: 24px; }
    .reviews-summary { display: flex; gap: 32px; align-items: flex-start; margin-bottom: 32px; flex-wrap: wrap; }
    .avg-rating-big { text-align: center; }
    .avg-num { font-size: 64px; font-weight: 800; color: var(--navy); font-family: var(--font-display); line-height: 1; }
    .avg-stars { font-size: 24px; color: var(--star); margin: 6px 0; }
    .avg-count { font-size: 13px; color: var(--text-muted); }
    .rating-bars { flex: 1; min-width: 200px; display: flex; flex-direction: column; gap: 8px; }
    .rating-bar-row { display: flex; align-items: center; gap: 10px; font-size: 13px; }
    .rating-bar-label { width: 24px; text-align: right; color: var(--text-muted); font-weight: 600; }
    .rating-bar-track { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .rating-bar-fill { height: 100%; background: var(--star); border-radius: 4px; transition: width .5s; }
    .rating-bar-pct { width: 36px; font-size: 12px; color: var(--text-muted); }
    .review-form { background: var(--bg); border-radius: var(--radius-lg); padding: 24px; margin-bottom: 32px; }
    .review-form h3 { font-family: var(--font-display); font-size: 18px; font-weight: 800; color: var(--navy); margin-bottom: 18px; }
    .star-picker { display: flex; gap: 6px; margin-bottom: 16px; }
    .star-pick { font-size: 28px; cursor: pointer; color: var(--border); transition: color .15s; }
    .star-pick.active { color: var(--star); }
    .form-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .form-row label { font-size: 13px; font-weight: 700; color: var(--navy); }
    .form-row input, .form-row textarea { padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 9px; font-family: var(--font-body); font-size: 14px; color: var(--text); background: white; outline: none; transition: border-color .2s; }
    .form-row input:focus, .form-row textarea:focus { border-color: var(--orange); }
    .form-row textarea { resize: vertical; min-height: 90px; }
    .review-card { border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 14px; }
    .review-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; flex-wrap: wrap; gap: 8px; }
    .reviewer-name { font-weight: 700; color: var(--navy); font-size: 14px; }
    .review-date { font-size: 12px; color: var(--text-muted); }
    .review-stars { color: var(--star); font-size: 15px; margin-bottom: 6px; }
    .review-title { font-weight: 700; color: var(--text); font-size: 14px; margin-bottom: 4px; }
    .review-body { font-size: 13.5px; color: var(--text-muted); line-height: 1.6; }
    .back-btn { display: inline-flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: #c5d8ff; background: rgba(255,255,255,.1); padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; transition: background .2s; }
    .back-btn:hover { background: rgba(255,255,255,.2); }
    [data-theme="dark"] .product-img-area { background: #1a1a2e; }
    [data-theme="dark"] .product-title { color: #e2e8f0; }
    [data-theme="dark"] .product-price-now { color: #e2e8f0; }
    [data-theme="dark"] .product-delivery-info { background: #1a1a2e; }
    [data-theme="dark"] .qty-controls { border-color: var(--border); }
    [data-theme="dark"] .qty-controls button { background: #1a1a2e; color: #e2e8f0; }
    [data-theme="dark"] .qty-controls span { color: #e2e8f0; }
    [data-theme="dark"] .info-tab.active { color: #e2e8f0; }
    [data-theme="dark"] .review-form { background: #1a1a2e; }
    [data-theme="dark"] .form-row input, [data-theme="dark"] .form-row textarea { background: #12121f; border-color: var(--border); color: #e2e8f0; }
    [data-theme="dark"] .review-card { border-color: var(--border); }
    [data-theme="dark"] .reviewer-name { color: #e2e8f0; }
    [data-theme="dark"] .related-section h2, [data-theme="dark"] .reviews-section h2 { color: #e2e8f0; }
    [data-theme="dark"] .avg-num { color: #e2e8f0; }
    @media (max-width: 768px) {
      .product-detail-grid { grid-template-columns: 1fr; }
      .product-img-area { position: static; font-size: 100px; }
      .related-grid { grid-template-columns: repeat(2, 1fr); }
      .product-title { font-size: 22px; }
      .product-price-now { font-size: 28px; }
    }
  </style>
</head>
<body>
